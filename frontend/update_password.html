<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkAccess | Actualizar contraseña</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="recover-body">

  <main class="recover-container">
    <div class="login-card">
      <h2>Nueva contraseña</h2>
      <p class="login-subtitle">Ingresa tu nueva contraseña para acceder al sistema.</p>

      <form id="updatePasswordForm">
        <div class="input-box">
          <label for="new-password">Nueva contraseña</label>
          <div class="input-field">
            <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" required />
          </div>
        </div>

        <button type="submit" class="btn-login">Actualizar contraseña</button>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/update_password.js"></script>
</body>
</html>
